<footer id="site-footer">
	{%- if config.extra.footer.show_copyright %}
		<span id="site-footer-copyright" title="Site last updated 3 May 2025, 03:39 (MSK)">
			{%- if config.extra.footer.copyright %}
				{{ config.extra.footer.copyright | markdown | safe }}
			{%- else %}
				<p>&copy; {{ config.title }}, 2025</p>
			{%- endif %}
		</span>
	{%- endif %}
	{%- if config.extra.footer.show_fediring  %}
		<div id="site-footer-fediring">
			<a class="external" href="https://fediring.net">Fediring</a>
			<a class="previous" href="https://fediring.net/previous?host={{ config.base_url | replace(from='https://', to='') }}" title="Previous"><i class="ph-bold ph-arrow-left"></i></a>
			<a class="random" href="https://fediring.net/random" title="Random"><i class="ph-bold ph-dice-three"></i></a>
			<a class="next" href="https://fediring.net/next?host={{ config.base_url | replace(from='https://', to='') }}" title="Next"><i class="ph-bold ph-arrow-right"></i></a>
		</div>
	{%- endif %}
</footer>
